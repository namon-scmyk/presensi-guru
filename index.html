<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi Guru</title>
  <!-- Menghilangkan spasi di CDN URL -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background-color: #f8f9fa;
    }
    
    h1 {
      color: #4f46e5;
      text-align: center;
      margin-bottom: 2rem;
    }
    
    form {
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
    }
    
    input, select {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 0.375rem;
    }
    
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #4338ca;
    }
    
    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 0.375rem;
    }
    
    .success {
      background-color: #dcfce7;
      color: #16a34a;
    }
    
    .error {
      background-color: #fee2e2;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <h1>Presensi Guru</h1>

  <form id="presensiForm">
    <label for="nip">NIP:</label>
    <input type="text" id="nip" name="nip" required />
    
    <label for="nama">Nama:</label>
    <input type="text" id="nama" name="nama" required />
    
    <label for="jenis">Jenis:</label>
    <select id="jenis" name="jenis" required>
      <option value="masuk">Masuk</option>
      <option value="pulang">Pulang</option>
    </select>
    
    <button type="submit">Kirim Presensi</button>
  </form>

  <div id="result"></div>

  <!-- Pindahkan script ke akhir body agar DOM sudah termuat -->
  <script>
    // Tunggu DOM sepenuhnya termuat
    document.addEventListener('DOMContentLoaded', async () => {
      // Perbaiki URL dan API key (hilangkan spasi berlebih)
      const SUPABASE_URL = 'https://lfylqrgvcrbnkyvudtgj.supabase.co ';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeWxxcmd2Y3Jibmt5dnVkdGpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI5NzM3ODksImV4cCI6MjA2ODU0OTc4OX0.pw9jKov4bpHoiCM31mS8I4PfUAk39mqX2eeF69Gs1ag';

      // Periksa apakah Supabase berhasil dimuat
      if (typeof supabase === 'undefined' || !supabase.createClient) {
        const resultDiv = document.getElementById('result');
        resultDiv.className = 'error';
        resultDiv.textContent = 'Gagal memuat klien Supabase. Pastikan koneksi internet Anda stabil.';
        return;
      }

      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const form = document.getElementById('presensiForm');
      const resultDiv = document.getElementById('result');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Nonaktifkan tombol selama proses pengiriman
        const submitButton = form.querySelector('button');
        submitButton.disabled = true;
        submitButton.textContent = 'Mengirim...';

        try {
          const nip = form.nip.value.trim();
          const nama = form.nama.value.trim();
          const jenis = form.jenis.value;
          const deviceInfo = navigator.userAgent;
          const waktuScan = new Date().toISOString();

          const { error } = await supabaseClient
            .from('presensi')
            .insert([
              {
                NIP: nip,
                Nama: nama,
                "Waktu Scan": waktuScan,
                Jenis: jenis,
                "Device Info": deviceInfo
              }
            ]);

          if (error) {
            resultDiv.className = 'error';
            resultDiv.textContent = `Gagal kirim presensi: ${error.message}`;
          } else {
            resultDiv.className = 'success';
            resultDiv.textContent = `Presensi berhasil dikirim. Terima kasih, ${nama}!`;
            form.reset();
          }
        } catch (err) {
          resultDiv.className = 'error';
          resultDiv.textContent = `Terjadi kesalahan: ${err.message}`;
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Kirim Presensi';
        }
      });
    });
  </script>
</body>
</html>
