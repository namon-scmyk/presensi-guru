<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presensi Otomatis Guru</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background-color: #f8f9fa;
      text-align: center;
    }
    h1 {
      color: #4f46e5;
      margin-bottom: 2rem;
    }
    #notif {
      padding: 1rem;
      border-radius: 0.5rem;
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 2rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .valid {
      background-color: #dcfce7;
      color: #16a34a;
      border: 2px solid #16a34a;
    }
    .invalid {
      background-color: #fee2e2;
      color: #dc2626;
      border: 2px solid #dc2626;
    }
  </style>
</head>
<body>
  <h1>Presensi Otomatis Guru</h1>
  <div id="notif">Memproses presensi...</div>

  <script>
    (async () => {
      const SUPABASE_URL = 'https://lfylqrgvcrbnkyvudtgj.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeWxxcmd2Y3Jibmt5dnVkdGpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI5NzM3ODksImV4cCI6MjA2ODU0OTc4OX0.pw9jKov4bpHoiCM31mS8I4PfUAk39mqX2eeF69Gs1ag';

      const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const notifDiv = document.getElementById('notif');

      // Ambil parameter URL
      function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
      }

      const nip = getQueryParam('nip');
      const jenis = getQueryParam('jenis'); // masuk/pulang

      if (!nip || !jenis) {
        notifDiv.className = 'invalid';
        notifDiv.textContent = 'Parameter URL tidak lengkap. Pastikan scan QR yang benar.';
        return;
      }

      // Hari saat ini
      const hariList = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const now = new Date();
      const hari = hariList[now.getDay()];

      // Fungsi menentukan jam pelajaran (disesuaikan dengan jadwal sekolah)
      function getJamPelajaran(date) {
        const jam = date.getHours();
        const menit = date.getMinutes();

        if (jam === 7 && menit >= 0 && menit < 45) return 'I';
        if ((jam === 7 && menit >= 45) || (jam === 8 && menit < 30)) return 'II';
        if ((jam === 8 && menit >= 30 && menit < 45)) return 'III';
        if ((jam === 8 && menit >= 45) || (jam === 9 && menit < 30)) return 'IV';
        if ((jam === 9 && menit >= 30) || (jam === 10 && menit < 15)) return 'V';
        return 'Tidak dalam jam pelajaran';
      }

      const jam = getJamPelajaran(now);

      if (jam === 'Tidak dalam jam pelajaran') {
        notifDiv.className = 'invalid';
        notifDiv.textContent = 'Saat ini bukan jam pelajaran. Presensi tidak valid.';
        return;
      }

      // Cek jadwal guru di tabel 'jadwal'
      const { data: jadwal, error: jadwalError } = await supabase
        .from('jadwal')
        .select('*')
        .eq('NIP', nip)
        .eq('Hari', hari)
        .eq('Jam', jam)
        .limit(1);

      if (jadwalError) {
        notifDiv.className = 'invalid';
        notifDiv.textContent = `Terjadi kesalahan saat cek jadwal: ${jadwalError.message}`;
        return;
      }

      if (!jadwal || jadwal.length === 0) {
        notifDiv.className = 'invalid';
        notifDiv.textContent = 'Tidak valid: Anda tidak dijadwalkan mengajar saat ini.';
        return;
      }

      // Insert data presensi ke tabel 'presensi'
      const deviceInfo = navigator.userAgent;
      const waktuScan = now.toISOString();

      const { error: insertError } = await supabase
        .from('presensi')
        .insert([
          {
            NIP: nip,
            Nama: jadwal[0].Nama,
            'Waktu Scan': waktuScan,
            Hari: hari,
            Kelas: jadwal[0].Kelas,
            Jam: jam,
            'Device info': deviceInfo,
            Jenis: jenis
          }
        ]);

      if (insertError) {
        notifDiv.className = 'invalid';
        notifDiv.textContent = `Gagal simpan presensi: ${insertError.message}`;
        return;
      }

      // Notifikasi valid
      notifDiv.className = 'valid';
      notifDiv.textContent = `Presensi valid! Anda mengajar di kelas ${jadwal[0].Kelas} pada jam pelajaran ${jam}. Terima kasih.`;
    })();
  </script>
</body>
</html>
